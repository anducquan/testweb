<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đang xem phim</title>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #000; overflow: hidden; }
        .artplayer-app { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; padding-bottom: env(safe-area-inset-bottom); z-index: 1;}
        .back-btn { position: absolute; top: max(15px, env(safe-area-inset-top)); left: max(15px, env(safe-area-inset-left)); z-index: 9999; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-family: sans-serif; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        .error-msg { color: white; text-align: center; padding-top: 100px; font-family: sans-serif; display: none; position: relative; z-index: 10;}
        
        #authArea { position: absolute; top: max(15px, env(safe-area-inset-top)); right: max(15px, env(safe-area-inset-right)); z-index: 9999; }
        .auth-btn { background: #e50914; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: sans-serif;}
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 20px; font-family: sans-serif; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);}
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; }
        .logout-text { font-size: 13px; font-weight: bold; color: #ccc; }
        .logout-text:hover { color: white; }
        
        /* CSS CHO PANEL DANH SÁCH TẬP */
        .episodes-panel {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
            z-index: 99999; transition: right 0.3s ease; padding: 20px 15px;
            box-sizing: border-box; overflow-y: auto; color: white;
            border-left: 1px solid rgba(255,255,255,0.1); font-family: sans-serif;
            /* Fix lỗi cuộn trên điện thoại */
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior: contain; 
        }
        
        @media (max-width: 768px) {
            .custom-btn-text { display: none; }
        }
        .episodes-panel.open { right: 0; }
        .ep-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .ep-header h3 { margin: 0; font-size: 18px; color: #e50914;}
        .ep-close-btn { background: transparent; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; transition: 0.2s;}
        .ep-close-btn:hover { background: #e50914; border-color: #e50914;}
        .ep-list-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .ep-item { background: #333; padding: 10px 5px; border-radius: 5px; text-decoration: none; color: white; text-align: center; font-size: 14px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .ep-item:hover { background: #555; }
        .ep-item.active { background: #e50914; font-weight: bold; pointer-events: none; box-shadow: 0 0 10px rgba(229,9,20,0.5);}
    </style>
</head>
<body>
    <a href="#" id="backBtn" class="back-btn">← Quay lại</a>
    
    <div class="artplayer-app" id="player-container"></div>
    <div class="error-msg" id="error-msg"><h2>Không tìm thấy nguồn phát!</h2></div>

    <div class="episodes-panel" id="episodesPanel">
        <div class="ep-header">
            <h3>Danh sách tập</h3>
            <button class="ep-close-btn" onclick="document.getElementById('episodesPanel').classList.remove('open')">Đóng ✕</button>
        </div>
        <div class="ep-list-container" id="epListContainer">
            <p style="grid-column: span 2; text-align: center; color: #aaa;">Đang tải...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let videoUrl = decodeURIComponent(urlParams.get('url'));
        let slug = urlParams.get('slug'); 

        // Fix lỗi ấn nút back bị chuyển qua lại giữa các tập đã xem
        const backBtn = document.getElementById('backBtn');
        if (slug) {
            backBtn.href = `detail.html?slug=${slug}`;
        } else {
            backBtn.href = 'index.html';
        }
        if (!videoUrl || videoUrl === 'null') {
            document.getElementById('error-msg').style.display = 'block';
        } else {
            var art = new Artplayer({
                container: '.artplayer-app',
                url: videoUrl,
                type: 'm3u8',
                volume: 1, 
                autoplay: true, 
                setting: true, 
                playbackRate: true, 
                fullscreen: true, 
                fullscreenWeb: true, // Ép dùng Web Fullscreen để hiển thị được menu Tập Phim đè lên video
                playsInline: true, 
                fastForward: true,
                lockDeviceOrientation: true, 
                autoOrientation: true, // Tự động xoay ngang khi bật fullscreen trên đt
                theme: '#e50914',

                customType: {
                    m3u8: function (video, url, art) {
                        if (Hls.isSupported()) {
                            const hls = new Hls({
                                enableWorker: true,
                                capLevelToPlayerSize: true,
                                maxBufferLength: 15,
                                maxMaxBufferLength: 30,
                                startLevel: -1
                            });
                            
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            art.hls = hls;
                            
                            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                                if (data.levels.length > 1) {
                                    let quality = data.levels.map((level, index) => ({
                                        default: index === data.levels.length - 1,
                                        html: level.height + 'P',
                                        level: index,
                                    }));
                                    art.setting.add({
                                        html: 'Chất lượng',
                                        selector: quality,
                                        onSelect: function (item) {
                                            hls.currentLevel = item.level;
                                            return item.html;
                                        },
                                    });
                                }
                            });
                            art.on('destroy', () => hls.destroy());
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        } else { 
                            art.notice.show = 'Trình duyệt không hỗ trợ HLS'; 
                        }
                    },
                },
            });

            if (slug) {
                // ================= GỌI API ĐỂ LÀM DANH SÁCH TẬP & CHUYỂN TẬP =================
                const pOphim = fetch(`https://ophim1.com/v1/api/phim/${slug}`).then(r => r.json());
                const pKkphim = fetch(`https://phimapi.com/phim/${slug}`).then(r => r.json());

                Promise.allSettled([pOphim, pKkphim]).then(async results => {
                    // Trích xuất năm của phim trên OPhim để làm chuẩn
                    let ophimYear = null;
                    if (results[0].status === 'fulfilled' && (results[0].value.status === 'success' || results[0].value.status === true)) {
                        ophimYear = results[0].value.data?.item?.year || results[0].value.movie?.year;
                    }

                    // Nếu KKPhim thành công NGUYÊN BẢN nhưng sai lệch năm quá 1, ép thất bại để không bị trộn nhầm phim trùng tên
                    if (ophimYear && results[1].status === 'fulfilled' && (results[1].value.status === 'success' || results[1].value.status === true)) {
                        let kkYear = results[1].value.movie?.year || results[1].value.data?.item?.year;
                        if (kkYear && Math.abs(Number(ophimYear) - Number(kkYear)) > 1) {
                            results[1].value.status = false; // Cố tình cho thất bại để fallback tìm lại
                        }
                    }

                    // Fallback xử lý lệch slug năm hoặc ép lỗi ở trên
                    if (results[1].status === 'fulfilled' && results[1].value.status === false) {
                        let altSlug = slug.match(/-\d{4}$/) ? slug.replace(/-\d{4}$/, '') : null;
                        if (!altSlug && ophimYear) {
                            altSlug = `${slug}-${ophimYear}`;
                        }
                        if (altSlug) {
                            const altRes = await fetch(`https://phimapi.com/phim/${altSlug}`).then(r => r.json()).catch(() => null);
                            if (altRes && (altRes.status === 'success' || altRes.status === true)) {
                                let y2 = altRes.movie?.year || altRes.data?.item?.year;
                                if (!y2 || Math.abs(Number(ophimYear) - Number(y2)) <= 1) {
                                    results[1].value = altRes;
                                }
                            }
                        }
                    }

                    let episodes = [];
                    
                    // OPhim
                    if (results[0].status === 'fulfilled' && (results[0].value.status === 'success' || results[0].value.status === true)) {
                        const data = results[0].value;
                        let eps = (data.data && data.data.item && data.data.item.episodes) ? data.data.item.episodes : [];
                        eps.forEach(s => {
                            s.server_name = `Server 1 (OPhim) - ${s.server_name}`;
                            episodes.push(s);
                        });
                    }

                    // KKPhim
                    if (results[1].status === 'fulfilled' && (results[1].value.status === 'success' || results[1].value.status === true)) {
                        const data = results[1].value;
                        let eps = data.episodes || ((data.data && data.data.item && data.data.item.episodes) ? data.data.item.episodes : []);
                        eps.forEach(s => {
                            s.server_name = `Server 2 (KKPhim) - ${s.server_name}`;
                            episodes.push(s);
                        });
                    }
                        
                    if (episodes.length > 0) {
                        // Nhúng panel vào trong Artplayer để nó hiển thị được khi Fullscreen
                        art.on('ready', () => {
                            if (document.getElementById('episodesPanel')) {
                                art.template.$player.appendChild(document.getElementById('episodesPanel'));
                            }
                        });

                        // 1. Gắn nút Mở Danh Sách Tập vào trình phát (Dạng Icon)
                        art.controls.add({
                            position: 'right',
                            html: '<div style="display:flex; align-items:center; padding: 0 10px; cursor: pointer;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></div>',
                            tooltip: 'Danh sách tập',
                            click: function () {
                                document.getElementById('episodesPanel').classList.add('open');
                            }
                        });

                        // 2. Render danh sách tập ra thanh Panel (Đa Server)
                        const epListContainer = document.getElementById('epListContainer');
                        epListContainer.innerHTML = '';
                        
                        let hasNextEp = false;
                        let nextEpUrl = '';
                        let nextEpName = '';

                        episodes.forEach(server => {
                            // Tiêu đề Server
                            const serverHeading = document.createElement('div');
                            serverHeading.style.gridColumn = '1 / -1';
                            serverHeading.style.marginTop = '15px';
                            serverHeading.style.color = '#e50914';
                            serverHeading.style.fontWeight = 'bold';
                            serverHeading.style.fontSize = '15px';
                            serverHeading.innerText = `▶ ${server.server_name}`;
                            epListContainer.appendChild(serverHeading);
                            
                            server.server_data.forEach((ep, index) => {
                                const isActive = (ep.link_m3u8 === videoUrl);
                                const activeClass = isActive ? 'active' : '';
                                const epUrl = `watch.html?url=${encodeURIComponent(ep.link_m3u8)}&slug=${slug}&server=${encodeURIComponent(server.server_name)}`;
                                
                                // 3. Xử lý logic Tập hiện tại và Tập tiếp theo
                                if (isActive) {
                                    // Bắt đầu logic tua thời gian bằng cách so khớp tên tập gốc (vd: "Tập 6")
                                    const epName = ep.name;
                                    let progressData = JSON.parse(localStorage.getItem('videoProgress')) || {};
                                    
                                    // Migrate dữ liệu cũ nếu nó là number
                                    if (typeof progressData[slug] === 'number') {
                                        progressData[slug] = { time: progressData[slug], epName: epName };
                                    } else if (progressData[slug] && progressData[slug].videoUrl) {
                                        // Migrate từ videoUrl sang epName
                                        progressData[slug] = { time: progressData[slug].time, epName: epName };
                                    }

                                    if (progressData[slug] && progressData[slug].time > 0 && progressData[slug].epName === epName) {
                                        // Đợi video load xong metadata mới tua
                                        art.once('video:loadedmetadata', () => {
                                            art.currentTime = progressData[slug].time;
                                            art.notice.show = `Đã tự động tua đến phút ${Math.floor(progressData[slug].time / 60)}`;
                                        });
                                        // Đề phòng trường hợp đã load metadata trước đó
                                        if (art.video.readyState >= 1) {
                                            art.currentTime = progressData[slug].time;
                                        }
                                    }
                                    
                                    art.on('video:timeupdate', () => {
                                        let currentTime = Math.floor(art.currentTime);
                                        if (currentTime % 5 === 0 && currentTime > 0) {
                                            progressData[slug] = { time: currentTime, epName: epName };
                                            localStorage.setItem('videoProgress', JSON.stringify(progressData));
                                            if(currentTime % 15 === 0 && window.syncToCloud) {
                                                window.syncToCloud('videoProgress', progressData);
                                            }
                                        }
                                    });

                                    // Ghi lịch sử đúng tên tập + server
                                    let history = JSON.parse(localStorage.getItem('watchHistory')) || {};
                                    if (history[slug]) {
                                        let eName = `[${server.server_name}] ` + (ep.name.startsWith('Tập') || ep.name === 'Full' ? ep.name : 'Tập ' + ep.name);
                                        history[slug].epName = eName;
                                        localStorage.setItem('watchHistory', JSON.stringify(history));
                                        if (window.syncToCloud) window.syncToCloud('watchHistory', history);
                                    }

                                    // Có tập tiếp theo không?
                                    if (index < server.server_data.length - 1) {
                                        hasNextEp = true;
                                        const nextEp = server.server_data[index + 1];
                                        nextEpName = nextEp.name;
                                        nextEpUrl = `watch.html?url=${encodeURIComponent(nextEp.link_m3u8)}&slug=${slug}&server=${encodeURIComponent(server.server_name)}`;
                                    }
                                }

                                // Render nút
                                const epNameShort = ep.name.replace('Tập ', 'T'); 
                                epListContainer.innerHTML += `<a href="${epUrl}" class="ep-item ${activeClass}">${epNameShort}</a>`;
                            });
                        });

                        // Xử lý nút Tập Tiếp Theo
                        if (hasNextEp) {
                            // Đưa nút Next ra ngoài thành Icon
                            art.controls.add({
                                position: 'right',
                                html: '<div style="display:flex; align-items:center; padding: 0 10px; cursor: pointer;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></div>',
                                tooltip: 'Tập tiếp theo: ' + nextEpName,
                                click: function () {
                                    window.location.href = nextEpUrl;
                                }
                            });

                            art.setting.add({
                                html: 'Chuyển Tập Tiếp Theo',
                                icon: '⏭️',
                                tooltip: nextEpName,
                                click: function () {
                                    window.location.href = nextEpUrl;
                                }
                            });
                            art.on('video:ended', () => {
                                art.notice.show = 'Đang tự động chuyển ' + nextEpName + '...';
                                setTimeout(() => {
                                    window.location.href = nextEpUrl;
                                }, 3000);
                            });
                        }
                    }
                })
                .catch(err => console.error("Lỗi API tập phim:", err));
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="auth.js"></script>
</body>
</html>
